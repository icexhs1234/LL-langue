<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的词典 - AI Dictionary</title>
    <link rel="apple-touch-icon" href="icon-192.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .flashcard-inner { transition: transform 0.6s; transform-style: preserve-3d; }
        .flipped { transform: rotateY(180deg); }
        .back { backface-visibility: hidden; transform: rotateY(180deg); }
        .front { backface-visibility: hidden; }
    </style>
</head>
<body class="bg-green-50 min-h-screen font-sans text-slate-800">

    <!-- 1. 语言设置模态框 (持久化) -->
    <div id="lang-setup" class="fixed inset-0 bg-white z-50 flex flex-col p-8 hidden">
        <h1 class="text-3xl font-bold mb-6 text-green-600">设置语言偏好</h1>
        <label class="mb-2 font-medium">我的母语：</label>
        <select id="native-lang" class="p-3 bg-white border-2 border-green-200 rounded-xl mb-4">
            <option value="zh-CN">中文 (简体)</option>
            <option value="en-US">English</option>
            <!-- 更多语言... -->
        </select>
        <label class="mb-2 font-medium">我要学习：</label>
        <select id="target-lang" class="p-3 bg-white border-2 border-green-200 rounded-xl mb-8">
            <option value="en-US">English</option>
            <option value="ja-JP">日本語</option>
            <option value="es-ES">Español</option>
        </select>
        <button onclick="saveSettings()" class="bg-green-500 text-white py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition">开启学习之旅</button>
    </div>

    <!-- 2. 主界面 -->
    <main id="app" class="max-w-md mx-auto p-4 pb-24">
        <!-- 搜索框 -->
        <div class="relative mt-4">
            <input id="word-input" type="text" placeholder="输入生词或短语..." class="w-full p-4 rounded-2xl shadow-sm border-none focus:ring-2 focus:ring-green-400">
            <button onclick="searchWord()" class="absolute right-2 top-2 bg-green-500 text-white px-4 py-2 rounded-xl">查询</button>
        </div>

        <!-- 结果卡片 -->
        <div id="result-container" class="mt-6 space-y-4">
            <!-- 动态插入卡片 -->
        </div>
    </main>

    <!-- 3. 底部导航栏 -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-md border-t flex justify-around p-3">
        <button onclick="switchTab('search')" class="flex flex-col items-center text-green-600">
            <span class="text-xs mt-1">搜索</span>
        </button>
        <button onclick="switchTab('notebook')" class="flex flex-col items-center text-slate-400">
            <span class="text-xs mt-1">笔记本</span>
        </button>
        <button onclick="switchTab('flashcard')" class="flex flex-col items-center text-slate-400">
            <span class="text-xs mt-1">闪卡</span>
        </button>
    </nav>

    <script>
        // --- 核心逻辑 ---
        let config = JSON.parse(localStorage.getItem('dict_config')) || null;
        let notebook = JSON.parse(localStorage.getItem('dict_notebook')) || [];

        window.onload = () => {
            if (!config) {
                document.getElementById('lang-setup').classList.remove('hidden');
            }
        };

        function saveSettings() {
            config = {
                native: document.getElementById('native-lang').value,
                target: document.getElementById('target-lang').value
            };
            localStorage.setItem('dict_config', JSON.stringify(config));
            document.getElementById('lang-setup').classList.add('hidden');
        }

        // --- 语音功能 ---
        function speak(text, lang) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = lang;
            speechSynthesis.speak(utterance);
        }

        // --- 词汇查询 (模拟 AI 响应) ---
        async function searchWord() {
            const word = document.getElementById('word-input').value;
            if(!word) return;

            // 这里应该是调用你的 AI API
            const mockData = {
                word: word,
                definition: "这个词在口语里超级常用，指代那种‘恍然大悟’的感觉。",
                examples: [
                    {target: "I finally got it!", native: "我终于懂了！", type: "spoken"},
                    {target: "She elucidated the concept.", native: "她阐明了这个概念。", type: "written"}
                ],
                culture: "起源于古法语，原意是‘照亮’。"
            };

            renderCard(mockData);
        }

        function renderCard(data) {
            const html = `
                <div class="bg-white p-6 rounded-3xl shadow-xl border border-green-100">
                    <div class="flex justify-between items-start mb-4">
                        <h2 class="text-2xl font-bold text-green-700">${data.word}</h2>
                        <button onclick="speak('${data.word}', '${config.target}')" class="p-2 bg-green-50 rounded-full">🔊</button>
                    </div>
                    <p class="text-slate-600 mb-4">${data.definition}</p>
                    <div class="space-y-3 mb-6">
                        ${data.examples.map(ex => `
                            <div class="bg-slate-50 p-3 rounded-lg">
                                <p class="font-medium">${ex.target} <button onclick="speak('${ex.target}', '${config.target}')">🔈</button></p>
                                <p class="text-sm text-slate-400">${ex.native}</p>
                            </div>
                        `).join('')}
                    </div>
                    <div class="bg-amber-50 p-4 rounded-2xl border-l-4 border-amber-400 italic text-sm">
                        <p>💡 ${data.culture}</p>
                    </div>
                    <button onclick="addToNotebook(${JSON.stringify(data).replace(/"/g, '&quot;')})" class="w-full mt-4 py-2 border-2 border-green-400 text-green-600 rounded-xl font-bold">加入笔记本</button>
                </div>
            `;
            document.getElementById('result-container').innerHTML = html;
        }

        function addToNotebook(data) {
            // 添加 SRS 数据
            const entry = {
                ...data,
                id: Date.now(),
                status: 'unlearned', // unlearned, learning, mastered
                interval: 0,
                nextReview: Date.now()
            };
            notebook.push(entry);
            localStorage.setItem('dict_notebook', JSON.stringify(notebook));
            alert('已存入笔记本！');
        }
    </script>
</body>
</html>
